const SinglyLL = () => (
  <div>
    <H2>Singly Linked List</H2>
    <P>Each node has <Tag>data</Tag> and one pointer <Tag>next</Tag> pointing to the next node. The last node's next is <Tag color="#ef4444">null</Tag>.</P>
    <NodeRow nodes={[10,20,30,40,50]} />
    <CB code={`// ─── Node class ───
class Node {
    int data;
    Node next;

    Node(int data) {
        this.data = data;
        this.next = null;
    }
}

// ─── Singly Linked List class ───
class SinglyLinkedList {
    Node head;      // points to first node
    int size = 0;

    // ── Add at beginning  O(1)
    void addFirst(int data) {
        Node newNode = new Node(data);
        newNode.next = head;
        head = newNode;
        size++;
    }

    // ── Add at end  O(n)
    void addLast(int data) {
        Node newNode = new Node(data);
        if (head == null) { head = newNode; size++; return; }
        Node curr = head;
        while (curr.next != null) curr = curr.next;
        curr.next = newNode;
        size++;
    }

    // ── Add at specific index  O(n)
    void addAt(int index, int data) {
        if (index < 0 || index > size) throw new IndexOutOfBoundsException();
        if (index == 0) { addFirst(data); return; }
        Node newNode = new Node(data);
        Node curr = head;
        for (int i = 0; i < index - 1; i++) curr = curr.next;
        newNode.next = curr.next;
        curr.next = newNode;
        size++;
    }

    // ── Remove from beginning  O(1)
    int removeFirst() {
        if (head == null) throw new RuntimeException("List is empty");
        int val = head.data;
        head = head.next;
        size--;
        return val;
    }

    // ── Remove from end  O(n)
    int removeLast() {
        if (head == null) throw new RuntimeException("List is empty");
        if (head.next == null) { int val=head.data; head=null; size--; return val; }
        Node curr = head;
        while (curr.next.next != null) curr = curr.next;
        int val = curr.next.data;
        curr.next = null;
        size--;
        return val;
    }

    // ── Remove at specific index  O(n)
    int removeAt(int index) {
        if (index < 0 || index >= size) throw new IndexOutOfBoundsException();
        if (index == 0) return removeFirst();
        Node curr = head;
        for (int i = 0; i < index - 1; i++) curr = curr.next;
        int val = curr.next.data;
        curr.next = curr.next.next;
        size--;
        return val;
    }

    // ── Get value at index  O(n)
    int get(int index) {
        if (index < 0 || index >= size) throw new IndexOutOfBoundsException();
        Node curr = head;
        for (int i = 0; i < index; i++) curr = curr.next;
        return curr.data;
    }

    // ── Search  O(n)
    boolean contains(int data) {
        Node curr = head;
        while (curr != null) {
            if (curr.data == data) return true;
            curr = curr.next;
        }
        return false;
    }

    // ── Size, isEmpty
    int size() { return size; }
    boolean isEmpty() { return head == null; }

    // ── Print list
    void print() {
        Node curr = head;
        StringBuilder sb = new StringBuilder("HEAD -> ");
        while (curr != null) {
            sb.append(curr.data);
            sb.append(curr.next != null ? " -> " : " -> NULL");
            curr = curr.next;
        }
        System.out.println(sb);
    }
}

// ─── Usage Example ───
public class Main {
    public static void main(String[] args) {
        SinglyLinkedList list = new SinglyLinkedList();
        list.addLast(10);
        list.addLast(20);
        list.addLast(30);
        list.addFirst(5);
        list.addAt(2, 15);
        list.print();
        // HEAD -> 5 -> 10 -> 15 -> 20 -> 30 -> NULL
        System.out.println("Removed: " + list.removeFirst()); // 5
        System.out.println("Contains 20: " + list.contains(20)); // true
        list.print();
        // HEAD -> 10 -> 15 -> 20 -> 30 -> NULL
    }
}`} />
  </div>
);

const DoublyLL = () => (
  <div>
    <H2>Doubly Linked List</H2>
    <P>Each node has <Tag>data</Tag>, a <Tag color="#a855f7">prev</Tag> pointer, and a <Tag>next</Tag> pointer. You can traverse <b>both forward and backward</b>.</P>
    <NodeRow nodes={[10,20,30,40,50]} type="doubly" />
    <Box color="purple" title="Key Difference from Singly">
      Extra <b>prev</b> pointer per node. Removing a node is O(1) if you have a reference to it (no need to find the previous node). Uses more memory.
    </Box>
    <CB code={`// ─── Node class for Doubly LL ───
class DNode {
    int data;
    DNode prev, next;

    DNode(int data) { this.data = data; }
}

class DoublyLinkedList {
    DNode head, tail;   // track both ends
    int size = 0;

    // ── Add at beginning  O(1)
    void addFirst(int data) {
        DNode node = new DNode(data);
        if (head == null) { head = tail = node; size++; return; }
        node.next = head;
        head.prev = node;
        head = node;
        size++;
    }

    // ── Add at end  O(1)  ← advantage over singly!
    void addLast(int data) {
        DNode node = new DNode(data);
        if (tail == null) { head = tail = node; size++; return; }
        tail.next = node;
        node.prev = tail;
        tail = node;
        size++;
    }

    // ── Add at index  O(n)
    void addAt(int index, int data) {
        if (index == 0) { addFirst(data); return; }
        if (index == size) { addLast(data); return; }
        DNode node = new DNode(data);
        DNode curr = head;
        for (int i = 0; i < index - 1; i++) curr = curr.next;
        node.next = curr.next;
        node.prev = curr;
        if (curr.next != null) curr.next.prev = node;
        curr.next = node;
        size++;
    }

    // ── Remove from beginning  O(1)
    int removeFirst() {
        if (head == null) throw new RuntimeException("Empty");
        int val = head.data;
        head = head.next;
        if (head != null) head.prev = null;
        else tail = null;
        size--;
        return val;
    }

    // ── Remove from end  O(1)  ← major advantage!
    int removeLast() {
        if (tail == null) throw new RuntimeException("Empty");
        int val = tail.data;
        tail = tail.prev;
        if (tail != null) tail.next = null;
        else head = null;
        size--;
        return val;
    }

    // ── Remove a specific node  O(1) (if you have reference)
    void removeNode(DNode node) {
        if (node.prev != null) node.prev.next = node.next;
        else head = node.next;    // it was head
        if (node.next != null) node.next.prev = node.prev;
        else tail = node.prev;    // it was tail
        size--;
    }

    // ── Print forward
    void printForward() {
        DNode curr = head;
        System.out.print("NULL <-> ");
        while (curr != null) {
            System.out.print(curr.data + (curr.next!=null?" <-> ":" <-> NULL"));
            curr = curr.next;
        }
        System.out.println();
    }

    // ── Print backward
    void printBackward() {
        DNode curr = tail;
        System.out.print("NULL <-> ");
        while (curr != null) {
            System.out.print(curr.data + (curr.prev!=null?" <-> ":" <-> NULL"));
            curr = curr.prev;
        }
        System.out.println();
    }
}`} />
  </div>

const CircularLL = () => (
  <div>
    <H2>Circular Linked List</H2>
    <P>The last node's <Tag>next</Tag> points back to the <Tag color="#f59e0b">head</Tag> instead of null. It can be singly or doubly circular. Great for round-robin scheduling, music playlists, etc.</P>
    <NodeRow nodes={[10,20,30,40,50]} circular />
    <CB code={`// ─── Circular Singly Linked List ───
class CircularSinglyLL {
    Node head;
    int size = 0;

    // ── Add at end  O(n)
    void add(int data) {
        Node node = new Node(data);
        if (head == null) {
            head = node;
            node.next = head;   // points to itself!
            size++; return;
        }
        // Find last node (whose next == head)
        Node last = head;
        while (last.next != head) last = last.next;
        last.next = node;
        node.next = head;       // new node points back to head
        size++;
    }

    // ── Add at beginning  O(n)
    void addFirst(int data) {
        Node node = new Node(data);
        if (head == null) { head = node; node.next = head; size++; return; }
        Node last = head;
        while (last.next != head) last = last.next;
        node.next = head;
        head = node;
        last.next = head;   // update last node to new head
        size++;
    }

    // ── Remove from beginning  O(n)
    int removeFirst() {
        if (head == null) throw new RuntimeException("Empty");
        int val = head.data;
        if (head.next == head) { head = null; size--; return val; }
        Node last = head;
        while (last.next != head) last = last.next;
        head = head.next;
        last.next = head;   // last now points to new head
        size--;
        return val;
    }

    // ── Print (stop when we loop back)
    void print() {
        if (head == null) return;
        Node curr = head;
        do {
            System.out.print(curr.data);
            curr = curr.next;
            if (curr != head) System.out.print(" -> ");
        } while (curr != head);
        System.out.println(" -> (back to " + head.data + ")");
    }

    // ── Search
    boolean contains(int data) {
        if (head == null) return false;
        Node curr = head;
        do {
            if (curr.data == data) return true;
            curr = curr.next;

class CircularDoublyLL {
    DNode head;
    int size = 0;

    void add(int data) {
        DNode node = new DNode(data);
        if (head == null) {
            head = node;
            node.next = node.prev = head;  // both point to itself
            size++; return;
        }
        DNode last = head.prev;   // in circular doubly, head.prev IS the last!
        last.next = node;
        node.prev = last;
        node.next = head;
        head.prev = node;
        size++;
    }

    void print() {
        if (head == null) return;
        DNode curr = head;
        do {
            System.out.print(curr.data);
            curr = curr.next;
            if (curr != head) System.out.print(" <-> ");
        } while (curr != head);
        System.out.println(" <-> (back to " + head.data + ")");
    }

boolean hasLoop() {

        fast = fast.next.next;

const StackArray = () => (
  <div>
    <H2>Stack Implementation Using Array</H2>
    <Box color="blue" title="How it works">
      Use an array + an integer <b>top</b> that tracks the index of the top element. Start with top = -1 (empty). Push increments top first, pop returns and decrements.
    </Box>
    <CB code={`// ─── Stack Using Array ───
class StackArray {
    private int[] arr;
    private int top;
    private int capacity;

    // Constructor
    StackArray(int capacity) {
        this.capacity = capacity;
        arr = new int[capacity];
        top = -1;   // -1 means empty
    }

    // ── Push  O(1)
    void push(int data) {
        if (top == capacity - 1) {
            System.out.println("Stack Overflow! Cannot push " + data);
            return;
        }
        arr[++top] = data;
    }

    // ── Pop  O(1)
    int pop() {
        if (isEmpty()) {
            System.out.println("Stack Underflow!");
            return -1;
        }
        return arr[top--];
    }

    // ── Peek  O(1)
    int peek() {
        if (isEmpty()) {
            System.out.println("Stack is empty");
            return -1;
        }
        return arr[top];
    }

    // ── Checks
    boolean isEmpty() { return top == -1; }
    boolean isFull()  { return top == capacity - 1; }
    int size()        { return top + 1; }

    // ── Print stack
    void print() {
        if (isEmpty()) { System.out.println("[]"); return; }
        System.out.print("TOP -> ");
        for (int i = top; i >= 0; i--) {
            System.out.print("[" + arr[i] + "] ");
        }
        System.out.println("<- BOTTOM");
    }
}

// ─── Dynamic Stack (auto-resize like ArrayList) ───
class DynamicStack {
    private int[] arr;
    private int top;
    private int capacity;

    DynamicStack(int initialCapacity) {
        capacity = initialCapacity;
        arr = new int[capacity];
        top = -1;
    }

    void push(int data) {
        if (top == capacity - 1) resize();   // double size when full
        arr[++top] = data;
    }

    private void resize() {
        capacity *= 2;
        int[] newArr = new int[capacity];
        System.arraycopy(arr, 0, newArr, 0, top + 1);
        arr = newArr;
        System.out.println("Resized to " + capacity);
    }

    int pop()      { if (isEmpty()) return -1; return arr[top--]; }
    int peek()     { if (isEmpty()) return -1; return arr[top]; }
    boolean isEmpty() { return top == -1; }
    int size()     { return top + 1; }
}

// ─── Usage ───
public class Main {
    public static void main(String[] args) {
        StackArray s = new StackArray(5);
        s.push(10);  s.push(20);  s.push(30);
        s.print();       // TOP -> [30] [20] [10] <- BOTTOM
        System.out.println(s.peek());   // 30
        System.out.println(s.pop());    // 30
        System.out.println(s.pop());    // 20
        s.print();       // TOP -> [10] <- BOTTOM
    }
}`} />

    <H2>Stack Implementation Using Linked List</H2>
    <Box color="green" title="Advantage over Array Stack">
      No fixed size limit! The stack grows dynamically. Push = add to head (front of list). Pop = remove from head. Both are O(1).
    </Box>
    <CB code={`// ─── Stack Using Linked List ───
class StackNode {
    int data;
    StackNode next;
    StackNode(int data) { this.data = data; }
}

class StackLL {
    private StackNode top;  // top of stack = head of list
    private int size;

    // ── Push  O(1)  — add new node at head
    void push(int data) {
        StackNode node = new StackNode(data);
        node.next = top;
        top = node;
        size++;
    }

    // ── Pop  O(1)  — remove head node
    int pop() {
        if (isEmpty()) throw new RuntimeException("Stack Underflow");
        int val = top.data;
        top = top.next;
        size--;
        return val;
    }

    // ── Peek  O(1)
    int peek() {
        if (isEmpty()) throw new RuntimeException("Stack is empty");
        return top.data;
    }

    boolean isEmpty() { return top == null; }
    int size()        { return size; }

    // ── Print stack
    void print() {
        StackNode curr = top;
        System.out.print("TOP -> ");
        while (curr != null) {
            System.out.print("[" + curr.data + "] -> ");
            curr = curr.next;
        }
        System.out.println("NULL (BOTTOM)");
    }
}

// ─── Generic Stack (works with any type) ───
class GenericStack<T> {
    private static class Node<T> {
        T data; Node<T> next;
        Node(T data) { this.data = data; }
    }
    private Node<T> top;
    private int size;

    void push(T data) {
        Node<T> node = new Node<>(data);
        node.next = top;
        top = node;
        size++;
    }
    T pop() {
        if (isEmpty()) throw new RuntimeException("Empty");
        T val = top.data;
        top = top.next;
        size--;
        return val;
    }
    T peek()          { if (isEmpty()) throw new RuntimeException(); return top.data; }
    boolean isEmpty() { return top == null; }
    int size()        { return size; }
}

// ─── Reverse a String using Stack ───
public static String reverseString(String s) {
    Stack<Character> stack = new Stack<>();
    
    // Push all characters
    for (char c : s.toCharArray()) {
        stack.push(c);
    }

      code:`import java.util.Stack;

// ─── Operator Precedence ───
static int precedence(char op) {
    if (op == '+' || op == '-') return 1;
    if (op == '*' || op == '/') return 2;
    if (op == '^')              return 3;
    return 0;
}

static boolean isRightAssociative(char op) {
    return op == '^';
}

// ─── Infix to Postfix Conversion ───
public static String infixToPostfix(String expr) {
    Stack<Character> stack  = new Stack<>();
    StringBuilder    result = new StringBuilder();

    for (int i = 0; i < expr.length(); i++) {
        char c = expr.charAt(i);
        if (c == ' ') continue;

        // Operand (letter or digit) — goes directly to output
        if (Character.isLetterOrDigit(c)) {
            result.append(c);
            result.append(' ');
        }
        // Left parenthesis — push to stack
        else if (c == '(') {
            stack.push(c);
        }
        // Right parenthesis — pop until matching '('
        else if (c == ')') {
            while (!stack.isEmpty() && stack.peek() != '(') {
                result.append(stack.pop());
                result.append(' ');
            }
            stack.pop(); // remove '('
        }
        // Operator
        else {
            while (!stack.isEmpty() &&
                   stack.peek() != '(' &&
                   (isRightAssociative(c)
                       ? precedence(stack.peek()) > precedence(c)
                       : precedence(stack.peek()) >= precedence(c))) {
                result.append(stack.pop());
                result.append(' ');
            }
            stack.push(c);
        }
    }
    // Pop remaining operators
    while (!stack.isEmpty()) {
        result.append(stack.pop());
        result.append(' ');
    }
    return result.toString().trim();
}

public static void main(String[] args) {
    System.out.println(infixToPostfix("A+B*C"));       // A B C * +
    System.out.println(infixToPostfix("(A+B)*C"));     // A B + C *
    System.out.println(infixToPostfix("A+B*C-D/E"));   // A B C * + D E / -
    System.out.println(infixToPostfix("A*(B+C)/D"));   // A B C + * D /
}

// ─── Evaluate Postfix Expression ───
public static double evaluatePostfix(String expr) {
    Stack<Double> stack = new Stack<>();
    String[] tokens = expr.split("\\s+"); // split by spaces
    
    for (String token : tokens) {
        // If it's a number, push it
        if (token.matches("-?\\d+(\\.\\d+)?")) {
            stack.push(Double.parseDouble(token));
        }
        // If it's an operator, pop two and compute
        else {
            if (stack.size() < 2) throw new RuntimeException("Invalid expression");
            double b = stack.pop();  // second operand
            double a = stack.pop();  // first operand
            switch (token) {
                case "+": stack.push(a + b); break;
                case "-": stack.push(a - b); break;
                case "*": stack.push(a * b); break;
                case "/":
                    if (b == 0) throw new ArithmeticException("Division by zero");
                    stack.push(a / b); break;
                case "^": stack.push(Math.pow(a, b)); break;
                default: throw new RuntimeException("Unknown operator: " + token);
            }
        }
    }
    if (stack.size() != 1) throw new RuntimeException("Invalid expression");
    return stack.pop();
}

static int applyOp(char op, int b, int a) {

        case '/': return a / b;

    if (op == '+' || op == '-') return 1;
    if (op == '*' || op == '/') return 2;
    return 0;

public static int evaluateInfix(String expr) {
    Stack<Integer>   values = new Stack<>();
    Stack<Character> ops    = new Stack<>();
    
    for (int i = 0; i < expr.length(); i++) {
        char c = expr.charAt(i);
        if (c == ' ') continue;

            while (i < expr.length() && Character.isDigit(expr.charAt(i))) {

    }
    while (!ops.isEmpty()) {

    }

    <H2>Queue Implementation Using Array (Circular)</H2>
    <Box color="yellow" title="Why Circular Array?">
      A simple array queue wastes space — front moves right but that space is lost. A <b>circular array</b> wraps around using modulo: <code style={{background:"#2d2a1a",padding:"2px 6px",borderRadius:"4px"}}>index = (index + 1) % capacity</code>
    </Box>
    <CB code={`// ─── Queue Using Circular Array ───
class QueueArray {
    private int[] arr;
    private int front;    // index of front element
    private int rear;     // index of rear element
    private int size;     // current number of elements
    private int capacity;

    QueueArray(int capacity) {
        this.capacity = capacity;
        arr = new int[capacity];
        front = 0;
        rear = -1;
        size = 0;
    }

    // ── Enqueue (add to rear)  O(1)
    void enqueue(int data) {
        if (size == capacity) {
            System.out.println("Queue is Full! Cannot enqueue " + data);
            return;
        }
        rear = (rear + 1) % capacity;   // wrap around!
        arr[rear] = data;
        size++;
    }

    // ── Dequeue (remove from front)  O(1)
    int dequeue() {
        if (isEmpty()) {
            System.out.println("Queue is Empty!");
            return -1;
        }
        int val = arr[front];
        front = (front + 1) % capacity; // wrap around!
        size--;
        return val;
    }

    // ── Peek (front element)  O(1)
    int peek() {
        if (isEmpty()) return -1;
        return arr[front];
    }

    // ── Rear element  O(1)
    int rearElement() {
        if (isEmpty()) return -1;
        return arr[rear];
    }

    boolean isEmpty()  { return size == 0; }
    boolean isFull()   { return size == capacity; }
    int size()         { return size; }

    // ── Print queue
    void print() {
        if (isEmpty()) { System.out.println("Queue: []"); return; }
        System.out.print("FRONT -> ");
        for (int i = 0; i < size; i++) {
            System.out.print("[" + arr[(front + i) % capacity] + "] ");
        }
        System.out.println("<- REAR");
    }
}

// ─── Dynamic Queue (auto-resize) ───
class DynamicQueue {
    private int[] arr;
    private int front, rear, size, capacity;

    DynamicQueue(int cap) {
        capacity = cap; arr = new int[cap];
        front = 0; rear = -1; size = 0;
    }

    void enqueue(int data) {
        if (size == capacity) resize();
        rear = (rear + 1) % capacity;
        arr[rear] = data;
        size++;
    }

    private void resize() {
        int newCap = capacity * 2;
        int[] newArr = new int[newCap];
        for (int i = 0; i < size; i++)
            newArr[i] = arr[(front + i) % capacity];
        arr = newArr; front = 0; rear = size - 1; capacity = newCap;
    }

    int dequeue() {
        if (size == 0) return -1;
        int val = arr[front];
        front = (front + 1) % capacity;
        size--;
        return val;
    }

    int peek()    { return size == 0 ? -1 : arr[front]; }
    boolean isEmpty() { return size == 0; }
    int size()    { return size; }
}

// ─── Usage ───
public static void main(String[] args) {
    QueueArray q = new QueueArray(5);
    q.enqueue(10); q.enqueue(20); q.enqueue(30);
    q.print();    // FRONT -> [10] [20] [30] <- REAR
    q.dequeue();
    q.print();    // FRONT -> [20] [30] <- REAR
    q.enqueue(40); q.enqueue(50); q.enqueue(60);
    q.print();    // FRONT -> [20] [30] [40] [50] [60] <- REAR
}`} />

class QNode {
    int data;
    QNode next;
    QNode(int data) { this.data = data; }
}

class QueueLL {
    private QNode front;   // remove from here
    private QNode rear;    // add to here
    private int size;

    // ── Enqueue (add at rear)  O(1)
    void enqueue(int data) {
        QNode node = new QNode(data);
        if (rear == null) {
            front = rear = node;
            size++;
            return;
        }
        rear.next = node;
        rear = node;
        size++;
    }

    // ── Dequeue (remove from front)  O(1)
    int dequeue() {
        if (isEmpty()) throw new RuntimeException("Queue is Empty");
        int val = front.data;
        front = front.next;
        if (front == null) rear = null; // queue became empty
        size--;
        return val;
    }

    // ── Peek / front element  O(1)
    int peek() {
        if (isEmpty()) throw new RuntimeException("Queue is Empty");
        return front.data;
    }

    int rearElement() {
        if (isEmpty()) throw new RuntimeException("Queue is Empty");
        return rear.data;
    }

    boolean isEmpty() { return front == null; }
    int size()        { return size; }

    // ── Print queue
    void print() {
        QNode curr = front;
        System.out.print("FRONT -> ");
        while (curr != null) {
            System.out.print("[" + curr.data + "]");
            if (curr.next != null) System.out.print(" -> ");
            curr = curr.next;
        }
        System.out.println(" <- REAR");
    }
}

// ─── Deque (Double-Ended Queue) using Doubly LL ───
class Deque {
    private DNode front, rear;
    private int size;

    // Add to front  O(1)
    void addFront(int data) {
        DNode node = new DNode(data);
        if (front == null) { front = rear = node; size++; return; }
        node.next = front;
        front.prev = node;
        front = node;
        size++;
    }

    // Add to rear  O(1)
    void addRear(int data) {
        DNode node = new DNode(data);
        if (rear == null) { front = rear = node; size++; return; }
        rear.next = node;
        node.prev = rear;
        rear = node;
        size++;
    }

    // Remove from front  O(1)
    int removeFront() {
        if (front == null) throw new RuntimeException("Empty");
        int val = front.data;
        front = front.next;
        if (front != null) front.prev = null;
        else rear = null;
        size--;
        return val;
    }

    // Remove from rear  O(1)
    int removeRear() {
        if (rear == null) throw new RuntimeException("Empty");
        int val = rear.data;
        rear = rear.prev;
        if (rear != null) rear.next = null;
        else front = null;
        size--;
        return val;
    }

    int peekFront() { return front != null ? front.data : -1; }
    int peekRear()  { return rear != null ? rear.data : -1; }
    boolean isEmpty() { return front == null; }
    int size()        { return size; }
}`} />

public static void reverseQueue(Queue<Integer> q) {
    Stack<Integer> stack = new Stack<>();
    
    // Step 1: Move all elements to stack
    while (!q.isEmpty()) {
        stack.push(q.poll());
    }
    
    // Step 2: Move back from stack to queue (reversed!)
    while (!stack.isEmpty()) {
        q.add(stack.pop());
    }

// ─── Reverse first K elements of Queue ───
public static void reverseFirstK(Queue<Integer> q, int k) {
    if (q.isEmpty() || k > q.size()) return;
    Stack<Integer> stack = new Stack<>();
    
    // Push first k elements to stack
    for (int i = 0; i < k; i++) stack.push(q.poll());
    
    // Put them back (reversed)
    while (!stack.isEmpty()) q.add(stack.pop());
    
    // Move remaining (n-k) elements to back
    int remaining = q.size() - k;
    for (int i = 0; i < remaining; i++) q.add(q.poll());
}

// ─── Find Maximum in Queue (non-destructive) ───
public static int findMax(Queue<Integer> q) {
    if (q.isEmpty()) throw new RuntimeException("Empty queue");
    int max = Integer.MIN_VALUE;
    int n = q.size();
    
    for (int i = 0; i < n; i++) {
        int val = q.poll();
        max = Math.max(max, val);
        q.add(val); // restore
    }
    return max;
}

// ─── Find Minimum in Queue ───
public static int findMin(Queue<Integer> q) {
    if (q.isEmpty()) throw new RuntimeException("Empty queue");
    int min = Integer.MAX_VALUE;
    int n = q.size();
    
    for (int i = 0; i < n; i++) {
        int val = q.poll();
        min = Math.min(min, val);
        q.add(val);
    }
    return min;
}

// ─── Sort a Queue using another Queue (Selection Sort) ───
public static void sortQueue(Queue<Integer> q) {
    int n = q.size();
    for (int i = 0; i < n; i++) {
        // Find minimum in remaining queue
        int min = Integer.MAX_VALUE;
        for (int j = 0; j < n - i; j++) {
            int val = q.poll();
            min = Math.min(min, val);
            q.add(val);
        }
        // Remove min from queue and put at back
        for (int j = 0; j < n - i; j++) {
            int val = q.poll();
            if (val != min) q.add(val);
            else min = Integer.MAX_VALUE; // remove only once
        }
        q.add(min); // add min to its sorted position
    }
}

    System.out.println("Min: " + findMin(q));  // 1

// ─── Queue Using Two Stacks ───
class QueueWithTwoStacks {
    private Stack<Integer> inbox  = new Stack<>(); // for enqueue
    private Stack<Integer> outbox = new Stack<>(); // for dequeue

    // ── Enqueue: always push to inbox  O(1)
    void enqueue(int data) {
        inbox.push(data);
    }

    // ── Dequeue: pop from outbox; if empty, refill from inbox  O(1) amortized
    int dequeue() {
        if (outbox.isEmpty()) {
            if (inbox.isEmpty()) throw new RuntimeException("Queue is empty");
            // Transfer all from inbox to outbox (reverses order = FIFO)
            while (!inbox.isEmpty()) {
                outbox.push(inbox.pop());
            }
        }
        return outbox.pop();
    }

    int peek() {
        if (outbox.isEmpty()) {
            while (!inbox.isEmpty()) outbox.push(inbox.pop());
        }
        if (outbox.isEmpty()) throw new RuntimeException("Empty");
        return outbox.peek();
    }

    boolean isEmpty() { return inbox.isEmpty() && outbox.isEmpty(); }
    int size()        { return inbox.size() + outbox.size(); }
}

// ─── Stack Using Two Queues ───
class StackWithTwoQueues {
    private Queue<Integer> q1 = new LinkedList<>();
    private Queue<Integer> q2 = new LinkedList<>();

    void push(int data) {
        q2.add(data);                      // add to q2
        while (!q1.isEmpty()) q2.add(q1.poll()); // move q1 to q2
        Queue<Integer> temp = q1; q1 = q2; q2 = temp; // swap
    }

    int pop()  { if (q1.isEmpty()) throw new RuntimeException(); return q1.poll(); }
    int peek() { if (q1.isEmpty()) throw new RuntimeException(); return q1.peek(); }
    boolean isEmpty() { return q1.isEmpty(); }
}

    System.out.println(q.dequeue()); // 2
